<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>question-last</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="dark">
  <meta name="theme-color" content="#0d0d0f">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
  <script type="text/javascript">
    // Decode the path GitHub Pages' 404.html redirect trick encoded into the
    // query string, back into a real history entry before Angular boots.
    (function (l) {
      if (l.search[1] === '/') {
        var decoded = l.search.slice(1).split('&').map(function (s) {
          return s.replace(/~and~/g, '&');
        }).join('?');
        window.history.replaceState(null, '', l.pathname.slice(0, -1) + decoded + l.hash);
      }
    }(window.location));
  </script>
</head>
<body>
  <app-root></app-root>
</body>
</html>
