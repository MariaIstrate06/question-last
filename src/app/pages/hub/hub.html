<main class="hub">
  <a routerLink="/" class="back-btn" aria-label="Back">← Back</a>

  <h1 class="hub__title">{{ hubTitle }}</h1>

  <nav class="tab-bar" role="tablist">
    @for (tab of tabs; track tab.id) {
      <button
        type="button"
        role="tab"
        class="tab-bar__tab"
        [class.tab-bar__tab--active]="selectedTab() === tab.id"
        [attr.aria-selected]="selectedTab() === tab.id"
        (click)="selectTab(tab.id)"
      >
        {{ tab.label }}
      </button>
    }
  </nav>

  <div class="hub__content">
    @if (loading()) {
      <p class="status-message">Loading…</p>
    } @else if (error()) {
      <p class="status-message status-message--error">{{ error() }}</p>
    } @else {
      @switch (selectedTab()) {
        @case ('ganduri') {
          <app-ganduri-list [items]="data().ganduri" />
        }
        @case ('reels') {
          <app-reels-list [items]="data().reels" />
        }
        @case ('muzica') {
          <app-muzica-list [items]="data().muzica" />
        }
        @case ('locuri') {
          <app-locuri-list [items]="data().locuri" />
        }
      }
    }
  </div>
</main>
